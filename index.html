<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRY HISTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="w-full max-w-lg">
        <h1 class="text-5xl font-black italic tracking-tighter text-blue-500 mb-10">ENTRY HISTORY</h1>

        <div class="flex gap-2 mb-12">
            <input id="targetInput" type="text" onkeyup="if(window.event.keyCode==13){startScan()}"
                   placeholder="닉네임 또는 아이디" 
                   class="flex-grow p-5 rounded-2xl bg-zinc-900 border border-zinc-800 outline-none focus:border-blue-500 font-bold text-white">
            <button onclick="startScan()" class="bg-blue-600 px-8 rounded-2xl font-black hover:bg-blue-500 active:scale-95 transition-all">
                스캔
            </button>
        </div>

        <div id="displayArea" class="hidden animate-in fade-in duration-500"></div>
    </div>

    <footer class="mt-20 text-zinc-700 text-[10px] font-black tracking-widest uppercase">
        Made by 어쩌다코딩
    </footer>

    <script>
        async function startScan() {
            const input = document.getElementById('targetInput').value.trim();
            const displayArea = document.getElementById('displayArea');
            if (!input) return alert("검색어를 입력하세요!");

            displayArea.classList.remove('hidden');
            displayArea.innerHTML = `<div class="p-10 font-black text-zinc-500 animate-pulse italic uppercase">Entry Server Scanning...</div>`;

            try {
                // [보안 우회] AllOrigins 프록시 사용
                const proxy = "https://api.allorigins.win/get?url=";
                
                // 1. 유저 기본 데이터 (팔로워/팔로잉 포함)
                const userRes = await fetch(proxy + encodeURIComponent(`https://playentry.org/api/v2/search/user?text=${input}`));
                const userJson = await userRes.json();
                const userData = JSON.parse(userJson.contents).data[0];

                if (!userData) throw new Error("유저를 찾을 수 없습니다.");
                const id = userData.username;

                // 2. 엔트리 이야기 개수 가져오기
                const storyRes = await fetch(proxy + encodeURIComponent(`https://playentry.org/api/discuss/find?user=${id}&target=story`));
                const storyJson = await storyRes.json();
                const storyData = JSON.parse(storyJson.contents);
                const storyCount = storyData.total || 0;

                // 3. 화면에 그리기
                displayArea.innerHTML = `
                    <div class="card p-10 shadow-2xl">
                        <div class="flex items-center gap-5 mb-10 text-left">
                            <img src="${userData.image?.status === 'custom' ? 'https://playentry.org/uploads/profile/' + id.slice(0,2) + '/' + id.slice(2,4) + '/avatar/' + id + '.png' : 'https://playentry.org/img/DefaultAvatar.png'}" 
                                 class="w-20 h-20 rounded-full border-2 border-blue-500 p-1 shadow-lg">
                            <div>
                                <h2 class="text-2xl font-black">${userData.nickname}</h2>
                                <p class="text-blue-500 font-bold text-xs uppercase tracking-tighter">@${id}</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-3 mb-10">
                            <div class="p-4 bg-white/5 rounded-2xl">
                                <p class="text-zinc-600 text-[9px] font-black uppercase mb-1">Follower</p>
                                <p class="text-xl font-black">${userData.followerCount.toLocaleString()}</p>
                            </div>
                            <div class="p-4 bg-white/5 rounded-2xl">
                                <p class="text-zinc-600 text-[9px] font-black uppercase mb-1">Following</p>
                                <p class="text-xl font-black">${userData.followingCount.toLocaleString()}</p>
                            </div>
                            <div class="p-4 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                                <p class="text-blue-500 text-[9px] font-black uppercase mb-1">Stories</p>
                                <p class="text-xl font-black text-blue-500">${storyCount.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="pt-8 border-t border-white/5">
                            <p class="text-4xl font-black italic tracking-tighter text-white uppercase">Scan Success</p>
                        </div>
                    </div>`;

            } catch (e) {
                displayArea.innerHTML = `<div class="card p-10 text-red-500 font-black italic">ERROR: 유저를 찾을 수 없습니다.</div>`;
            }
        }
    </script>
</body>
</html>
