<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        .fade-out { animation: fadeOut 0.6s ease forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body class="bg-white dark:bg-[#111] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">
    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-6 right-6 p-3 rounded-2xl bg-slate-100 dark:bg-white/5 shadow-sm">🌓</button>
    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold tracking-tight mb-2">Entry History</h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">통합 팔로워 데이터를 조회합니다.</p>
    </div>
    <div class="w-full max-w-md flex gap-2 mb-12">
        <input id="userInput" type="text" onkeyup="if(window.event.keyCode==13){searchUser()}" placeholder="닉네임 또는 아이디" class="flex-grow p-4 rounded-2xl bg-slate-100 dark:bg-white/5 outline-none focus:ring-2 ring-blue-500 transition-all font-semibold">
        <button onclick="searchUser()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-4 rounded-2xl font-bold transition-all active:scale-95">조회</button>
    </div>
    <div id="resultArea" class="hidden w-full max-w-md"></div>
    <footer class="mt-20 text-slate-400 text-[10px] font-bold tracking-[0.3em] uppercase">Build by Jangye</footer>
    <script src="app.js"></script>
</body>
</html>
