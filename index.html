<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry History - 통합 조회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;800;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0a0a0a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

    <button onclick="document.documentElement.classList.toggle('dark')" class="fixed top-6 right-6 p-3 rounded-2xl bg-white dark:bg-zinc-800 shadow-md border dark:border-white/10 active:scale-90 transition-all">
        🌓
    </button>

    <div class="text-center mb-10">
        <div class="inline-block px-3 py-1 mb-3 rounded-full bg-blue-500/10 text-blue-500 text-[10px] font-black tracking-widest uppercase border border-blue-500/20">
            Database v2.0
        </div>
        <h1 class="text-5xl font-black tracking-tighter mb-2 italic">ENTRY <span class="text-blue-600">HISTORY</span></h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">잃어버린 팔로워 데이터를 통합하여 조회합니다.</p>
    </div>

    <div class="w-full max-w-md flex gap-2 mb-12">
        <input id="userInput" type="text" 
               onkeyup="if(window.event.keyCode==13){searchUser()}"
               placeholder="닉네임 또는 ID 입력" 
               class="flex-grow p-5 rounded-[24px] bg-white dark:bg-zinc-900 border-2 border-transparent focus:border-blue-500 shadow-xl outline-none transition-all font-bold text-lg dark:text-white">
        <button onclick="searchUser()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-5 rounded-[24px] font-black shadow-lg active:scale-95 transition-all">
            조회
        </button>
    </div>

    <div id="resultArea" class="hidden w-full max-w-md"></div>

    <footer class="mt-20 text-slate-400 dark:text-zinc-600 text-[10px] font-black tracking-[0.4em] uppercase">
        Project by Jangye © 2026
    </footer>

    <script>
        // [장부] 여기에 탈퇴 유저 정보를 추가하세요!
        const DELETED_DB = {
            "jangye": 2500,
            "entry_dev": 5000,
            "eojjeoda_coding": 1200,
            "legend_user": 10000
        };

        async function searchUser() {
            const input = document.getElementById('userInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            if (!input) return;

            // 로딩 상태
            resultArea.innerHTML = `
                <div class="text-center p-10 bg-white dark:bg-zinc-900 rounded-[40px] shadow-sm border dark:border-white/5">
                    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-slate-400 font-bold tracking-tight">데이터 동기화 중...</p>
                </div>`;
            resultArea.classList.remove('hidden');

            try {
                // 1. 닉네임 검색으로 ID 찾기
                const searchRes = await fetch(`https://playentry.org/api/v2/search/user?text=${encodeURIComponent(input)}`);
                const searchData = await searchRes.json();
                
                // 검색 결과가 있으면 첫 번째 유저, 없으면 입력값 그대로 ID로 취급
                const targetId = (searchData.data && searchData.data.length > 0) ? searchData.data[0].username : input;

                // 2. 프로필 상세 데이터 가져오기
                const res = await fetch(`https://playentry.org/api/user/profile/${targetId}`);
                if (!res.ok) throw new Error();
                const data = await res.json();

                // 3. 점수 계산
                const current = data.followerCount || 0;
                const deleted = DELETED_DB[targetId] || 0;
                const total = current + deleted;
