<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRY HISTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: 0.3s; }
        .scan-line { animation: scan 2s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="mb-10">
        <h1 class="text-5xl font-black tracking-tighter mb-2 italic text-blue-600">ENTRY HISTORY</h1>
        <p class="text-slate-400 text-sm font-bold uppercase tracking-[0.2em]">Real-time Scanner Bot</p>
    </div>

    <div class="w-full max-w-md flex gap-2 mb-8">
        <input id="userInput" type="text" onkeyup="if(window.event.keyCode==13){startScan()}"
               placeholder="조사할 아이디 또는 닉네임" 
               class="flex-grow p-5 rounded-3xl bg-white dark:bg-zinc-900 shadow-xl outline-none focus:ring-2 ring-blue-500 font-bold text-black dark:text-white">
        <button onclick="startScan()" class="bg-blue-600 text-white px-8 py-5 rounded-3xl font-black shadow-lg active:scale-95 transition-all">
            스캔
        </button>
    </div>

    <div id="resultArea" class="hidden w-full max-w-md relative"></div>

    <footer class="mt-20 text-slate-400 dark:text-zinc-600 text-[10px] font-black tracking-[0.4em] uppercase">
        Made by 어쩌다코딩
    </footer>

    <script>
        async function startScan() {
            const input = document.getElementById('userInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            if (!input) return;

            resultArea.innerHTML = `
                <div class="p-10 bg-white dark:bg-zinc-900 rounded-[40px] shadow-2xl relative overflow-hidden">
                    <div class="scan-line absolute left-0 w-full h-1 bg-blue-500/50 z-20"></div>
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-blue-500 font-black animate-pulse">명단 전수조사 중...</p>
                    <p id="countLog" class="text-xs text-slate-400 mt-2 font-mono">수집된 명단: 0명</p>
                </div>`;
            resultArea.classList.remove('hidden');

            try {
                const searchRes = await fetch(`https://playentry.org/api/v2/search/user?text=${encodeURIComponent(input)}`);
                const searchData = await searchRes.json();
                const target = (searchData.data && searchData.data.length > 0) ? searchData.data[0] : null;
                
                if (!target) throw new Error();
                const targetId = target.username;

                let allFollowers = [];
                let page = 1;
                let hasMore = true;

                while (hasMore && page <= 25) { // 스캔 범위를 25페이지로 조금 더 늘렸습니다
                    const fRes = await fetch(`https://playentry.org/api/user/followers/${targetId}?page=${page}`);
                    const fData = await fRes.json();
                    
                    if (fData && fData.length > 0) {
                        allFollowers = [...allFollowers, ...fData];
                        document.getElementById('countLog').innerText = `수집된 명단: ${allFollowers.length}명`;
                        page++;
                    } else {
                        hasMore = false;
                    }
                    await new Promise(r => setTimeout(r, 50));
                }

                resultArea.innerHTML = `
                    <div class="bg-white dark:bg-zinc-900 rounded-[45px] p-10 shadow-2xl border-4 border-blue-600/20 animate-in zoom-in duration-300">
                        <img src="${target.image?.status === 'custom' ? 'https://playentry.org/uploads/profile/' + targetId.slice(0,2) + '/' + targetId.slice(2,4) + '/avatar/' + targetId + '.png' : 'https://playentry.org/img/DefaultAvatar.png'}" 
                             class="w-24 h-24 rounded-full mx-auto mb-6 border-4 border-blue-500 shadow-lg object-cover">
                        <h2 class="text-2xl font-black mb-1">${target.nickname}</h2>
                        <p class="text-slate-400 text-xs font-bold mb-8 uppercase tracking-widest text-blue-500">Scan Report</p>
                        
                        <div class="grid grid-cols-2 gap-4 mb-8 text-sm">
                            <div class="p-4 bg-slate-50 dark:bg-white/5 rounded-2xl text-left">
                                <p class="text-slate-400 text-[10px] mb-1 font-black uppercase">Official</p>
                                <p class="font-black text-lg">${target.followerCount.toLocaleString()}</p>
                            </div>
                            <div class="p-4 bg-blue-500/10 rounded-2xl text-left">
                                <p class="text-blue-500 text-[10px] mb-1 font-black uppercase">Scanned</p>
                                <p class="font-black text-lg text-blue-600">${allFollowers.length.toLocaleString()}</p>
                            </div>
                        </div>

                        <div class="pt-6 border-t dark:border-white/5">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Verification</p>
                            <p class="text-blue-500 font-black italic">어쩌다코딩 Scanner Bot v2</p>
                        </div>
                    </div>`;

            } catch (e) {
                resultArea.innerHTML = `<div class="p-8 bg-red-500/10 text-red-500 rounded-3xl font-black">스캔 실패: 유저를 찾을 수 없습니다.</div>`;
            }
        }
    </script>
</body>
</html>
