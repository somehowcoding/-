<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRY HISTORY - RECOVERY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #050505; color: white; }
        .stat-value { font-size: 5rem; line-height: 1; letter-spacing: -0.05em; font-weight: 900; font-style: italic; }
        .recovery-glow { text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="w-full max-w-lg">
        <div class="mb-14">
            <h1 class="text-4xl font-black italic tracking-tighter text-blue-500 mb-2">ENTRY HISTORY</h1>
            <div class="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full">
                <p class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Follower Restoration Active</p>
            </div>
        </div>

        <div class="flex gap-2 mb-12">
            <input id="userInput" type="text" onkeyup="if(window.event.keyCode==13){scanUser()}"
                   placeholder="조회할 아이디 또는 닉네임" 
                   class="flex-grow p-5 rounded-2xl bg-zinc-900/50 border border-zinc-800 focus:border-blue-500 outline-none font-bold text-lg transition-all text-white">
            <button onclick="scanUser()" class="bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl font-black transition-all active:scale-95 shadow-lg shadow-blue-600/20">
                조회
            </button>
        </div>

        <div id="resultArea" class="hidden">
            </div>
    </div>

    <footer class="mt-20 text-zinc-700 text-[10px] font-black tracking-[0.5em] uppercase">
        Made by 어쩌다코딩
    </footer>

    <script>
        /**
         * [장부] 회탈 버그로 깎인 숫자를 여기에 입력하세요!
         * 형식 -> "아이디": 보정할_숫자
         */
        const RECOVERY_LIST = {
            "jangye": 2500,        // 장예님은 2500명 추가
            "com_p_0126": 1200,    // 어쩌다코딩님은 1200명 추가
            "entry": 50000         // 예시
        };

        async function scanUser() {
            const input = document.getElementById('userInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            if (!input) return;

            resultArea.classList.remove('hidden');
            resultArea.innerHTML = `<div class="p-10 text-zinc-500 font-black italic animate-pulse uppercase tracking-widest">Accessing Entry Database...</div>`;

            try {
                // 1. 유저 검색 (CORS 우회를 위해 allorigins 프록시 사용)
                const searchRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://playentry.org/api/v2/search/user?text=${input}`)}`);
                const searchJson = await searchRes.json();
                const searchData = JSON.parse(searchJson.contents);
                const user = searchData.data[0];

                if (!user) throw new Error();

                // 2. 복구 로직 적용
                const current = user.followerCount || 0;
                const restoreValue = RECOVERY_LIST[user.username] || 0; // 장부에 있으면 가져오고 없으면 0
                const finalCount = current + restoreValue;

                // 3. 결과 표시
                resultArea.innerHTML = `
                    <div class="p-10 rounded-[40px] bg-zinc-900/30 border border-white/5 backdrop-blur-xl animate-in fade-in zoom-in duration-500">
                        <div class="flex items-center justify-center gap-4 mb-10">
                            <img src="${user.image?.status === 'custom' ? 'https://playentry.org/uploads/profile/' + user.username.slice(0,2) + '/' + user.username.slice(2,4) + '/avatar/' + user.username + '.png' : 'https://playentry.org/img/DefaultAvatar.png'}" 
                                 class="w-16 h-16 rounded-full border-2 border-blue-500 p-1">
                            <div class="text-left">
                                <h2 class="text-2xl font-black leading-tight">${user.nickname}</h2>
                                <p class="text-blue-500 font-bold text-xs">@${user.username}</p>
                            </div>
                        </div>

                        <div class="space-y-4 mb-10">
                            <div class="flex justify-between items-center p-5 bg-white/5 rounded-2xl border border-white/5">
                                <span class="text-zinc-500 text-[10px] font-black uppercase">Current (Bugged)</span>
                                <span class="font-bold text-xl">${current.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between items-center p-5 bg-blue-500/10 rounded-2xl border border-blue-500/20">
                                <span class="text-blue-500 text-[10px] font-black uppercase">Restoration Data</span>
                                <span class="font-bold text-xl text-blue-500">+${restoreValue.toLocaleString()}</span>
                            </div>
                        </div>

                        <div class="pt-8 border-t border-white/10">
                            <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.6em] mb-2">Original Power Status</p>
                            <p class="stat-value text-white recovery-glow">${finalCount.toLocaleString()}</p>
                        </div>
                    </div>
                `;

            } catch (e) {
                resultArea.innerHTML = `<div class="p-10 font-black text-red-500 uppercase italic">User Not Found or Server Busy</div>`;
            }
        }
    </script>
</body>
</html>
