<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTRY HISTORY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: 0.3s; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-[#0a0a0a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="mb-12">
        <h1 class="text-5xl font-black tracking-tighter italic mb-2 text-blue-600">ENTRY HISTORY</h1>
        <p class="text-slate-400 text-xs font-bold tracking-[0.3em] uppercase">Bug Fix & Restore Module</p>
    </div>

    <div class="w-full max-w-md flex gap-2 mb-10">
        <input id="userInput" type="text" onkeyup="if(window.event.keyCode==13){restoreFollower()}"
               placeholder="닉네임 또는 ID" 
               class="flex-grow p-5 rounded-[28px] bg-white dark:bg-zinc-900 shadow-xl outline-none focus:ring-2 ring-blue-500 font-bold text-black dark:text-white">
        <button onclick="restoreFollower()" class="bg-blue-600 text-white px-8 py-5 rounded-[28px] font-black shadow-lg active:scale-95 transition-all">
            조회
        </button>
    </div>

    <div id="resultArea" class="hidden w-full max-w-md"></div>

    <footer class="mt-20 text-slate-400 dark:text-zinc-700 text-[10px] font-black tracking-[0.5em] uppercase">
        Made by 어쩌다코딩
    </footer>

    <script>
        // [수정 구역] 탈퇴로 사라진 팔로워 수를 기록하세요
        const RESTORE_DATA = {
            "jangye": 2500,
            "com_p_0126": 1200
        };

        async function restoreFollower() {
            const input = document.getElementById('userInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            if (!input) return alert("아이디를 입력해주세요!");

            // 즉시 반응 확인용 로딩창
            resultArea.classList.remove('hidden');
            resultArea.innerHTML = `<div class="p-10 bg-white dark:bg-zinc-900 rounded-[40px] shadow-2xl font-black text-blue-500 animate-pulse text-lg">데이터 분석 중...</div>`;

            try {
                // 보안 차단을 피하기 위한 프록시 주소 사용
                const proxy = "https://api.allorigins.win/get?url=";
                
                // 1. 유저 검색
                const searchUrl = encodeURIComponent(`https://playentry.org/api/v2/search/user?text=${input}`);
                const searchRes = await fetch(proxy + searchUrl);
                const searchJson = await searchRes.json();
                const searchData = JSON.parse(searchJson.contents);
                
                const target = (searchData.data && searchData.data.length > 0) ? searchData.data[0] : null;
                if (!target) throw new Error("유저를 찾을 수 없습니다.");
                
                const targetId = target.username;

                // 2. 프로필 상세 데이터
                const profileUrl = encodeURIComponent(`https://playentry.org/api/user/profile/${targetId}`);
                const profileRes = await fetch(proxy + profileUrl);
                const profileJson = await profileRes.json();
                const data = JSON.parse(profileJson.contents);

                // 3. 계산 및 출력
                const current = data.followerCount || 0;
                const bugLoss = RESTORE_DATA[targetId] || 0;
                const total = current + bugLoss;

                resultArea.innerHTML = `
                    <div class="bg-white dark:bg-zinc-900 rounded-[40px] p-10 shadow-2xl border dark:border-white/5">
                        <div class="flex items-center gap-5 mb-8">
                            <img src="${data.image?.status === 'custom' ? 'https://playentry.org/uploads/profile/' + targetId.slice(0,2) + '/' + targetId.slice(2,4) + '/avatar/' + targetId + '.png' : 'https://playentry.org/img/DefaultAvatar.png'}" 
                                 class="w-20 h-20 rounded-full border-4 border-blue-500 shadow-md object-cover">
                            <div class="text-left">
                                <h2 class="text-2xl font-black">${data.nickname}</h2>
                                <p class="text-blue-500 font-bold text-xs uppercase tracking-tighter">@${targetId}</p>
                            </div>
                        </div>
                        <div class="space-y-3 mb-8">
                            <div class="flex justify-between p-4 bg-slate-50 dark:bg-white/5 rounded-2xl font-bold">
                                <span class="text-slate-400 text-xs uppercase">Current</span>
                                <span>${current.toLocaleString()}</span>
                            </div>
                            <div class="flex justify-between p-4 bg-blue-500/5 rounded-2xl font-bold text-blue-500">
                                <span class="text-xs uppercase font-black tracking-widest">Restored</span>
                                <span>+${bugLoss.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="pt-6 border-t dark:border-white/5">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Adjusted</p>
                            <p class="text-6xl font-black italic tracking-tighter text-blue-600">${total.toLocaleString()}</p>
                        </div>
                    </div>`;

            } catch (e) {
                resultArea.innerHTML = `<div class="p-8 bg-red-500/10 text-red-500 rounded-[30px] font-black italic">ERROR: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
